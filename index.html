<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Background Themes 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    transition: 0.5s;
}

/* 🌈 Default Background */
body.default {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* 💙 Blue Theme */
body.blue {
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
}

/* 💜 Purple Theme */
body.purple {
    background: linear-gradient(135deg, #a18cd1, #fbc2eb);
}

/* 💚 Green Theme */
body.green {
    background: linear-gradient(135deg, #56ab2f, #a8e063);
}

/* 🖤 Dark Theme */
body.dark {
    background: linear-gradient(135deg, #232526, #414345);
    color: white;
}

/* 📸 Image Style */
img {
    width: 280px;
    border-radius: 20px;
    margin-top: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* 🎛 Buttons */
.theme-btn {
    padding: 10px 18px;
    margin: 8px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
}

/* Button Colors */
.red { background: #ff758c; color: white; }
.blue-btn { background: #36d1dc; color: white; }
.purple-btn { background: #a18cd1; color: white; }
.green-btn { background: #56ab2f; color: white; }
.dark-btn { background: #333; color: white; }

</style>
</head>

<body class="default">

<h2>💖 Choose Background Style</h2>

<img src="your-image.jpg" alt="Photo">

<div>
    <button class="theme-btn red" onclick="changeTheme('default')">Pink 💕</button>
    <button class="theme-btn blue-btn" onclick="changeTheme('blue')">Blue 💙</button>
    <button class="theme-btn purple-btn" onclick="changeTheme('purple')">Purple 💜</button>
    <button class="theme-btn green-btn" onclick="changeTheme('green')">Green 💚</button>
    <button class="theme-btn dark-btn" onclick="changeTheme('dark')">Dark 🖤</button>
</div>

<script>
function changeTheme(theme) {
    document.body.className = theme;
}
</script>

</body>
</html>
